services:
  postgres:
    image: postgres:16-alpine
    container_name: northops-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: northops
      POSTGRES_PASSWORD: northops_local_dev
      POSTGRES_DB: northops_fire
    volumes:
      - northops_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northops -d northops_fire"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  northops_pg_data:
